backend:
  name: git-gateway
  branch: main

locale: uk

media_folder: "images"

collections:
  - name: "news"
    label: "Новини"
    folder: "_news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Заголовок", name: "title", widget: "string" }
      - { label: "Дата", name: "date", widget: "datetime", format: "DD MMMM YYYY" }
      - { label: "Короткий текст", name: "excerpt", widget: "text" }
      - { label: "Повний текст", name: "body", widget: "markdown" }

  - name: "settings"
    label: "Налаштування сайту"
    files:
      - label: "Про нас"
        name: "about"
        file: "_data/about.yml"
        fields:
          - { label: "Текст абзац 1", name: "text1", widget: "text" }
          - { label: "Текст абзац 2", name: "text2", widget: "text" }
          - { label: "Текст абзац 3", name: "text3", widget: "text" }
          - { label: "Рік заснування", name: "year", widget: "string" }
          - { label: "Кількість громадян", name: "citizens", widget: "string" }
